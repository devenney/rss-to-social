name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Generate wrangler.personal.toml
        run: |
          cat > wrangler.personal.toml << 'WRANGLER_EOF'
          name = "rss-to-social"
          main = "src/index.ts"
          compatibility_date = "2026-06-15"
          compatibility_flags = ["nodejs_compat"]
          workers_dev = false
          preview_urls = false

          [triggers]
          crons = ["0 * * * *"]

          [[kv_namespaces]]
          binding = "SEEN_POSTS"
          id = "KV_NAMESPACE_ID_PLACEHOLDER"

          [vars]
          RSS_FEED_URL = "RSS_FEED_URL_PLACEHOLDER"
          BLUESKY_HANDLE = "BLUESKY_HANDLE_PLACEHOLDER"
          MASTODON_INSTANCE = "MASTODON_INSTANCE_PLACEHOLDER"

          [observability]
          enabled = true
          head_sampling_rate = 1
          WRANGLER_EOF
          sed -i "s|KV_NAMESPACE_ID_PLACEHOLDER|${{ secrets.KV_NAMESPACE_ID }}|g" wrangler.personal.toml
          sed -i "s|RSS_FEED_URL_PLACEHOLDER|${{ secrets.RSS_FEED_URL }}|g" wrangler.personal.toml
          sed -i "s|BLUESKY_HANDLE_PLACEHOLDER|${{ secrets.BLUESKY_HANDLE }}|g" wrangler.personal.toml
          sed -i "s|MASTODON_INSTANCE_PLACEHOLDER|${{ secrets.MASTODON_INSTANCE }}|g" wrangler.personal.toml
      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy
