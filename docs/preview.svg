<svg xmlns="http://www.w3.org/2000/svg" width="840" height="280" viewBox="0 0 840 280"
     font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
     font-size="13" role="img" aria-label="rss-to-social architecture: RSS Feed syndicates to Bluesky and Mastodon via a Cloudflare Worker cron">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#585B70"/>
    </marker>
  </defs>

  <!-- window -->
  <rect x="0" y="0" width="840" height="280" rx="10" fill="#1E1E2E"/>

  <!-- traffic lights -->
  <circle cx="20" cy="20" r="5" fill="#FF5F56"/>
  <circle cx="38" cy="20" r="5" fill="#FFBD2E"/>
  <circle cx="56" cy="20" r="5" fill="#27C93F"/>

  <!-- title -->
  <text x="420" y="20" fill="#6C7086" dominant-baseline="central" text-anchor="middle">rss-to-social</text>

  <!-- divider -->
  <line x1="0" y1="38" x2="840" y2="38" stroke="#313244" stroke-width="1"/>

  <!-- RSS Feed box -->
  <rect x="30" y="95" width="160" height="90" rx="8" fill="#181825" stroke="#FAB387" stroke-width="1.5"/>
  <text x="110" y="128" fill="#FAB387" text-anchor="middle" font-weight="bold" font-size="14">RSS Feed</text>
  <text x="110" y="152" fill="#6C7086" text-anchor="middle" font-size="11">/rss.xml</text>

  <!-- arrow RSS → Worker -->
  <line x1="191" y1="140" x2="259" y2="140" stroke="#585B70" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="225" y="127" fill="#F9E2AF" text-anchor="middle" font-size="11">⏱ hourly</text>

  <!-- Worker box -->
  <rect x="263" y="75" width="240" height="130" rx="8" fill="#181825" stroke="#A6E3A1" stroke-width="1.5"/>
  <text x="383" y="115" fill="#A6E3A1" text-anchor="middle" font-weight="bold" font-size="14">Cloudflare Worker</text>
  <text x="383" y="140" fill="#6C7086" text-anchor="middle" font-size="11">sync floor · KV dedup</text>
  <text x="383" y="160" fill="#6C7086" text-anchor="middle" font-size="11">auto-bootstrap on first run</text>

  <!-- arrow Worker → Bluesky -->
  <line x1="503" y1="122" x2="571" y2="97" stroke="#585B70" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- arrow Worker → Mastodon -->
  <line x1="503" y1="158" x2="571" y2="183" stroke="#585B70" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Bluesky box -->
  <rect x="575" y="58" width="220" height="78" rx="8" fill="#181825" stroke="#89B4FA" stroke-width="1.5"/>
  <text x="685" y="89" fill="#89B4FA" text-anchor="middle" font-weight="bold" font-size="14">Bluesky</text>
  <text x="685" y="113" fill="#6C7086" text-anchor="middle" font-size="11">AT Protocol · embed card</text>

  <!-- Mastodon box -->
  <rect x="575" y="164" width="220" height="78" rx="8" fill="#181825" stroke="#CBA6F7" stroke-width="1.5"/>
  <text x="685" y="195" fill="#CBA6F7" text-anchor="middle" font-weight="bold" font-size="14">Mastodon</text>
  <text x="685" y="219" fill="#6C7086" text-anchor="middle" font-size="11">REST API · link preview</text>

</svg>
