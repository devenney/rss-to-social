<svg xmlns="http://www.w3.org/2000/svg" width="840" height="300" viewBox="0 0 840 300" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13" role="img" aria-label="rss-to-social: a Cloudflare Worker that syndicates RSS posts to Bluesky and Mastodon">

  <!-- window -->
  <rect x="0" y="0" width="840" height="300" rx="10" fill="#1E1E2E"/>

  <!-- traffic lights -->
  <circle cx="20" cy="20" r="5" fill="#FF5F56"/>
  <circle cx="38" cy="20" r="5" fill="#FFBD2E"/>
  <circle cx="56" cy="20" r="5" fill="#27C93F"/>

  <!-- title -->
  <text x="420" y="20" fill="#6C7086" dominant-baseline="central" text-anchor="middle">rss-to-social</text>

  <!-- divider -->
  <line x1="0" y1="38" x2="840" y2="38" stroke="#313244" stroke-width="1"/>

  <!-- log line: bootstrapped -->
  <text x="20" y="72" fill="#A6E3A1" dominant-baseline="central">
    <tspan fill="#6C7086">{"event":</tspan><tspan fill="#A6E3A1">"bootstrapped"</tspan><tspan fill="#6C7086">,"syncFrom":</tspan><tspan fill="#F9E2AF">"2026-06-15T22:00:00.000Z"</tspan><tspan fill="#6C7086">}</tspan>
  </text>

  <!-- log line: feed_fetched -->
  <text x="20" y="112" fill="#CDD6F4" dominant-baseline="central">
    <tspan fill="#6C7086">{"event":</tspan><tspan fill="#89B4FA">"feed_fetched"</tspan><tspan fill="#6C7086">,"count":</tspan><tspan fill="#FAB387">1</tspan><tspan fill="#6C7086">,"ts":</tspan><tspan fill="#F9E2AF">"2026-06-15T23:00:00.000Z"</tspan><tspan fill="#6C7086">}</tspan>
  </text>

  <!-- log line: syndicated -->
  <text x="20" y="152" fill="#CDD6F4" dominant-baseline="central">
    <tspan fill="#6C7086">{"event":</tspan><tspan fill="#A6E3A1">"syndicated"</tspan><tspan fill="#6C7086">,"title":</tspan><tspan fill="#F9E2AF">"New post published"</tspan><tspan fill="#6C7086">,"results":{</tspan>
  </text>

  <!-- bluesky result -->
  <text x="36" y="192" fill="#CDD6F4" dominant-baseline="central">
    <tspan fill="#CBA6F7">"bluesky"</tspan><tspan fill="#6C7086">: </tspan><tspan fill="#F9E2AF">"at://did:plc:u7q2d3f/app.bsky.feed.post/3ktvex3bkjs2b"</tspan>
  </text>

  <!-- mastodon result -->
  <text x="36" y="232" fill="#CDD6F4" dominant-baseline="central">
    <tspan fill="#94E2D5">"mastodon"</tspan><tspan fill="#6C7086">: </tspan><tspan fill="#F9E2AF">"https://mastodon.social/@you/109823456789012345"</tspan>
  </text>

  <!-- closing brace -->
  <text x="20" y="270" fill="#6C7086" dominant-baseline="central">}}</text>

</svg>
